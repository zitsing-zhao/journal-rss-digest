name: Weekly RSS Digest

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and email digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || vars.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER || vars.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SSL: ${{ secrets.SMTP_SSL || vars.SMTP_SSL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || vars.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || vars.EMAIL_TO }}
          EMAIL_SUBJECT_PREFIX: ${{ secrets.EMAIL_SUBJECT_PREFIX || vars.EMAIL_SUBJECT_PREFIX }}
        run: |
          missing=0
          for name in SMTP_HOST SMTP_USER SMTP_PASSWORD EMAIL_TO; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty. Add it under Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          python build_digest.py --send-email

      - name: Commit digest and state
        run: |
          git config user.name "rss-digest-bot"
          git config user.email "rss-digest-bot@example.com"
          git add digests state
          git commit -m "Add weekly RSS digest" || echo "No changes to commit"
          git push
